version: '3.8'

services:
  thrift-shop:
    build: .
    container_name: williams-parkway-thrift
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONTEND_PATH=/app/frontend
    volumes:
      - ./backend/database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
